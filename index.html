<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Bos trip</title>

<style>

body{
background:#D8B4F8;
font-family:'poppins', sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
margin:0;
}

.container{
max-width:500px;
}

img{
width:250px;
border-radius:15px;
margin:20px;
}

button{
padding:15px 25px;
font-size:12px;
border:none;
border-radius:10px;
margin:10px;
cursor:pointer;
}

.yes{
background:#4CAF50;
color:whitw;
}

.no{
background:#ff3b3b;
color:white;
position:relative;
}

</style>
</head>

<body>

<div class="container" id="content">

<h1>bos trip attigini kabul eder misin?</h1>

<img src=ganyu.jpg>

<br>

<button class="yes" onclick="evet()">Evet 💚</button>
<button class="no" onclick="hayir()">Hayır ❌</button>

</div>

<audio autoplay loop>
<source src="geoffharvey-chase-me-366064.mp3" type="audio/mpeg">
</audio>

<script>

let step = 1;

function hayir(){

step++;

if(step == 2){

document.getElementById("content").innerHTML = `
<h1>NEE HAYIRA MI BASTIN</h1>
<img src=Ganyu Sticker.jpg>
<br>
<button class="yes" onclick="evet()">Evet 💚</button>
<button class="no" onclick="hayir()">Hayır ❌</button>
`;

}

else if(step == 3){

document.getElementById("content").innerHTML = `
<h1>giciklik yapma</h1>
<img src=ganyu2.jpg>
<br>
<button class="yes" onclick="evet()">Evet 💚</button>
<button class="no" onclick="hayir()">Hayır ❌</button>
`;

}

else if(step == 4){

document.getElementById("content").innerHTML = `
<h1>bence evete basman gerekiyor</h1>
<img src=ganyu3.jpg>
<br>
<button class="yes" onclick="evet()">Evet 💚</button>
<button class="no" onmouseover="kac()">Hayır ❌</button>
`;

}

}

function kac(){

let btn = document.querySelector(".no");

btn.style.position="absolute";
btn.style.top=Math.random()*80+"vh";
btn.style.left=Math.random()*80+"vw";

}

function evet(){

document.getElementById("content").innerHTML = `
<h1>kabul edecegini biliyordum</h1>
<img src=ganyu5.jpg>
`;

}

</script>

</body>

</html>
